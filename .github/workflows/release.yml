name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          git fetch --tags
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          BUMP="${{ inputs.bump_type }}"
          if [ -z "$LATEST" ]; then
            NEXT="v0.1.0"
          else
            MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)
            case "$BUMP" in
              major) NEXT="v$((MAJOR + 1)).0.0" ;;
              minor) NEXT="v${MAJOR}.$((MINOR + 1)).0" ;;
              *)     NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            esac
          fi
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Create release branch
        run: |
          BRANCH="release/${{ steps.version.outputs.tag }}"
          git checkout -b "$BRANCH"

      - name: Update CHANGELOG
        run: bash scripts/update-changelog.sh "${{ steps.version.outputs.tag }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="release/${{ steps.version.outputs.tag }}"
          if git diff --quiet CHANGELOG.md; then
            echo "No CHANGELOG changes — creating empty release commit."
            git commit --allow-empty -m "chore: release ${{ steps.version.outputs.tag }}"
          else
            git add CHANGELOG.md
            git commit -m "chore: release ${{ steps.version.outputs.tag }}"
          fi
          git push origin "$BRANCH"

      - name: Ensure release label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh label create release --color "0e8a16" --description "Release PR" 2>/dev/null || true

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          gh pr create \
            --base main \
            --head "release/${VERSION}" \
            --title "chore: release ${VERSION}" \
            --label "release" \
            --body "## Release ${VERSION}

          This PR was automatically created by the release workflow.

          **Version bump:** ${{ inputs.bump_type }}

          ### What to do
          1. Review the CHANGELOG changes
          2. Merge this PR to trigger the publish workflow"
