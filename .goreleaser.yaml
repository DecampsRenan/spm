version: 2

builds:
  - binary: spm
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "spm_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: decampsrenan
    name: spm
  prerelease: auto

brews:
  - repository:
      owner: decampsrenan
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/decampsrenan/spm
    description: "Smart Package Manager — auto-detects and proxies to the right Node.js package manager"
    license: MIT
    skip_upload: auto
